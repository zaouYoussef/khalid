<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maître Khalid Chafai — Avocat au Barreau de Tanger</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold2:#e8c97a;--gold3:#f5e8c0;--gold4:#a07830;--gold5:#f7e9b0;
  --noir:#060504;--dark1:#0e0c09;--dark2:#181410;--dark3:#211c14;--dark4:#2a221a;
  --cream:#f4ede0;--cream2:#e8d9c3;--text:#b8a990;--white:#faf6ef;
  --glow:rgba(201,168,76,0.15);--glow2:rgba(201,168,76,0.05);
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--noir);color:var(--text);font-family:'Crimson Pro',serif;font-size:18px;line-height:1.7;overflow-x:hidden;cursor:none}

/* ── CURSOR ── */
#cur{position:fixed;top:0;left:0;z-index:9999;pointer-events:none}
#cur-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;position:absolute;transform:translate(-50%,-50%);transition:.08s}
#cur-ring{width:40px;height:40px;border:1px solid rgba(201,168,76,.5);border-radius:50%;position:absolute;transform:translate(-50%,-50%);transition:width .4s,height .4s,border-color .4s,opacity .4s,box-shadow .4s}
#cur-ring.hover{width:70px;height:70px;border-color:rgba(201,168,76,.8);box-shadow:0 0 30px rgba(201,168,76,.2),inset 0 0 30px rgba(201,168,76,.08)}
#cur-trail{position:fixed;top:0;left:0;pointer-events:none;z-index:9998}
.trail-dot{position:fixed;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%)}

/* ── WEBGL CANVAS ── */
#gl-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ── NOISE OVERLAY ── */
body::before{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px}

/* ── AMBIENT GLOW ── */
.ambient-glow{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.ambient-glow .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.12;animation:orbFloat 20s ease-in-out infinite}
.ambient-glow .orb:nth-child(1){width:500px;height:500px;background:radial-gradient(circle,var(--gold),transparent);top:-10%;left:-5%;animation-delay:0s}
.ambient-glow .orb:nth-child(2){width:400px;height:400px;background:radial-gradient(circle,var(--gold4),transparent);bottom:-5%;right:-5%;animation-delay:-7s}
.ambient-glow .orb:nth-child(3){width:350px;height:350px;background:radial-gradient(circle,var(--gold2),transparent);top:40%;left:60%;animation-delay:-14s}

@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-30px) scale(1.05)}50%{transform:translate(-20px,20px) scale(.95)}75%{transform:translate(20px,30px) scale(1.02)}}

/* ── NAV ── */
nav{position:fixed;top:0;width:100%;z-index:1000;padding:30px 70px;display:flex;justify-content:space-between;align-items:center;transition:.6s cubic-bezier(.25,1,.5,1)}
nav.s{background:rgba(6,5,4,.94);backdrop-filter:blur(24px);border-bottom:1px solid rgba(201,168,76,.12);padding:18px 70px}
.nlogo{font-family:'Cinzel',serif;font-size:12px;letter-spacing:5px;color:var(--gold);text-decoration:none;position:relative}
.nlogo .logo-gold{display:inline-block;background:linear-gradient(135deg,var(--gold2),var(--gold),var(--gold4),var(--gold2));background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
.nlogo::after{content:'';position:absolute;bottom:-6px;left:0;width:100%;height:1px;background:linear-gradient(90deg,var(--gold),transparent);transform:scaleX(0);transform-origin:left;transition:.5s}
.nlogo:hover::after{transform:scaleX(1)}
.nav-line{position:absolute;bottom:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transform:scaleX(0);transition:transform .8s cubic-bezier(.25,1,.5,1)}
nav.s .nav-line{transform:scaleX(1)}
.nlinks{display:flex;gap:44px}
.nlinks a{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3.5px;text-transform:uppercase;color:var(--text);text-decoration:none;transition:.3s;position:relative;overflow:hidden;padding:4px 0}
.nlinks a span{display:block;transition:transform .4s cubic-bezier(.25,1,.5,1)}
.nlinks a::after{content:attr(data-text);position:absolute;top:100%;left:0;color:var(--gold);font-size:10px;letter-spacing:3.5px;transition:transform .4s cubic-bezier(.25,1,.5,1)}
.nlinks a:hover span{transform:translateY(-100%)}
.nlinks a:hover::after{transform:translateY(-100%)}
.nlink-line{position:absolute;bottom:0;left:0;width:100%;height:1px;background:var(--gold);transform:scaleX(0);transition:transform .4s;transform-origin:left}
.nlinks a:hover .nlink-line{transform:scaleX(1)}

/* ── HERO ── */
#hero{position:relative;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;overflow:hidden;z-index:2;perspective:1200px}
.hero-inner{position:relative;z-index:3;transform-style:preserve-3d}
#hero[data-tilt] .hero-inner{transition:transform .2s ease-out}
.hbadge{font-family:'Cinzel',serif;font-size:10px;letter-spacing:7px;color:var(--gold);text-transform:uppercase;margin-bottom:32px;opacity:0;animation:aup 1s .3s forwards;display:flex;align-items:center;gap:20px;justify-content:center}
.hbadge::before,.hbadge::after{content:'';width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));opacity:.7}
.hbadge::after{background:linear-gradient(90deg,var(--gold),transparent)}

.htitle{font-family:'Cinzel',serif;font-size:clamp(4rem,9vw,8rem);font-weight:900;color:var(--white);line-height:1;letter-spacing:2px;position:relative;margin-bottom:4px;opacity:0;animation:aup 1.2s .5s forwards;text-shadow:0 0 60px rgba(201,168,76,.08)}
.htitle .gold-line{display:block;background:linear-gradient(135deg,var(--gold5) 0%,var(--gold2) 20%,var(--gold) 40%,var(--gold4) 60%,var(--gold2) 80%,var(--gold5) 100%);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;position:relative}
.htitle .gold-line::after{content:attr(data-text);position:absolute;top:0;left:2px;width:100%;-webkit-text-stroke:1px rgba(201,168,76,.15);-webkit-text-fill-color:transparent;z-index:-1}
.htitle .glitch{position:relative}
.htitle .glitch::before,.htitle .glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;font-family:'Cinzel',serif;font-size:inherit;font-weight:900;-webkit-text-fill-color:transparent;-webkit-text-stroke:1px var(--gold);opacity:0}
.htitle .glitch.active::before{opacity:.6;animation:glitch1 .3s steps(2) forwards}
.htitle .glitch.active::after{opacity:.4;animation:glitch2 .3s steps(2) forwards}

.hsub{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2.5vw,1.5rem);font-style:italic;font-weight:300;color:var(--cream2);letter-spacing:4px;margin-bottom:20px;opacity:0;animation:aup 1s .85s forwards}
.hsub .hsub-word{display:inline-block;opacity:0;animation:hsubIn .5s forwards}
@keyframes hsubIn{to{opacity:1}}

.hdiv{width:1px;height:70px;background:linear-gradient(to bottom,var(--gold),transparent);margin:36px auto;opacity:0;animation:afadein 1.2s 1.1s forwards}
.htag{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2vw,1.3rem);font-style:italic;color:var(--text);max-width:560px;margin:0 auto;opacity:0;animation:aup 1s 1.3s forwards;line-height:1.8}
.htag strong{color:var(--gold);font-weight:400}
.htag .tag-pulse{animation:tagPulse 3s ease-in-out infinite}
@keyframes tagPulse{0%,100%{opacity:1}50%{opacity:.7}}
.hcta{margin-top:50px;display:flex;gap:20px;justify-content:center;opacity:0;animation:aup 1s 1.6s forwards}

/* ── MAGNETIC BUTTONS ── */
.btn-mag{position:relative;display:inline-block;cursor:none}
.btn-p{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--noir);background:linear-gradient(135deg,var(--gold2),var(--gold));border:none;padding:18px 44px;cursor:none;text-decoration:none;display:block;clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);transition:transform .4s,box-shadow .4s;position:relative;overflow:hidden}
.btn-p::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--gold5),var(--gold2),var(--gold));background-size:200%;opacity:0;transition:opacity .4s;animation:shimmer 2s linear infinite}
.btn-p:hover::before{opacity:1}
.btn-p:hover{box-shadow:0 0 50px rgba(201,168,76,.5),0 0 100px rgba(201,168,76,.15)}
.btn-p span{position:relative;z-index:1}
.btn-s{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--gold);background:transparent;border:1px solid rgba(201,168,76,.35);padding:18px 44px;cursor:none;text-decoration:none;display:block;clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);transition:.4s;position:relative;overflow:hidden}
.btn-s::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.15),transparent);transform:translateY(100%);transition:transform .4s}
.btn-s:hover::before{transform:translateY(0)}
.btn-s:hover{border-color:var(--gold);background:rgba(201,168,76,.07);box-shadow:0 0 30px rgba(201,168,76,.2)}

/* ── SCROLL INDICATOR ── */
.scroll-ind{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:afadein 1.2s 2.2s forwards;z-index:3}
.scroll-ind span{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;color:var(--gold);opacity:.5}
.scroll-mouse{width:22px;height:34px;border:1px solid rgba(201,168,76,.4);border-radius:11px;display:flex;align-items:flex-start;justify-content:center;padding-top:6px}
.scroll-wheel{width:3px;height:6px;background:var(--gold);border-radius:2px;animation:scrollw 1.8s ease-in-out infinite}

/* ── HERO RINGS ── */
.ring{position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,.06);pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)}

/* ── GLOW LINE ── */
.gline{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);position:relative}
.gline::after{content:'';position:absolute;top:-5px;left:0;right:0;height:10px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.3),transparent);filter:blur(4px)}

/* ── PROGRESS LINE ── */
.prog-line{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--gold4),var(--gold),var(--gold2),var(--gold));background-size:200%;z-index:2000;transform-origin:left;transform:scaleX(0);transition:transform .1s;animation:shimmer 2s linear infinite}

/* ── HOVER RIPPLE ── */
.ripple-el{position:fixed;width:60px;height:60px;border-radius:50%;background:rgba(201,168,76,.15);pointer-events:none;animation:rippleFX .8s ease-out forwards;z-index:9000}

/* ── GOLDEN SPARKLE ── */
.sparkle{position:fixed;pointer-events:none;z-index:9995;font-size:0}
.sparkle-inner{width:4px;height:4px;background:var(--gold);border-radius:50%;position:absolute;animation:sparkleFly 1s ease-out forwards}
@keyframes sparkleFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
.sparkle-inner::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:sparkleFlash .6s ease-out}

/* ── MOUSE TRAIL GLOW ── */
.mouse-glow{position:fixed;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.04),transparent 60%);pointer-events:none;z-index:1;transform:translate(-50%,-50%);transition:left .15s ease-out,top .15s ease-out;will-change:left,top}

/* ── TIMELINE VISUALIZER ── */
.timeline-bar{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:200px;height:2px;background:rgba(201,168,76,.1);border-radius:1px;z-index:100;opacity:0;transition:opacity .5s}
.timeline-bar.active{opacity:1}
.timeline-fill{height:100%;background:var(--gold);border-radius:1px;width:0%;transition:width .1s;box-shadow:0 0 10px rgba(201,168,76,.4)}

/* ── HAMBURGER MENU ── */
.hamburger{display:none;flex-direction:column;cursor:none;gap:6px;z-index:1001;position:relative}
.hamburger span{display:block;width:28px;height:2px;background:var(--gold);transition:.4s;transform-origin:center}
.hamburger.active span:nth-child(1){transform:translateY(8px) rotate(45deg)}
.hamburger.active span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.active span:nth-child(3){transform:translateY(-8px) rotate(-45deg)}

/* MOBILE OVERLAY */
.mobile-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(6,5,4,.97);backdrop-filter:blur(30px);z-index:998;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:24px;opacity:0;visibility:hidden;transition:opacity .5s,visibility .5s}
.mobile-overlay.active{opacity:1;visibility:visible}
.mobile-overlay a{font-family:'Cinzel',serif;font-size:clamp(1.2rem,5vw,2rem);letter-spacing:6px;text-transform:uppercase;color:var(--text);text-decoration:none;transition:.3s;transform:translateY(20px);opacity:0;transition:all .4s cubic-bezier(.25,1,.5,1)}
.mobile-overlay.active a{transform:translateY(0);opacity:1}
.mobile-overlay a:nth-child(1){transition-delay:.1s}
.mobile-overlay a:nth-child(2){transition-delay:.2s}
.mobile-overlay a:nth-child(3){transition-delay:.3s}
.mobile-overlay a:nth-child(4){transition-delay:.4s}
.mobile-overlay a:hover{color:var(--gold)}
.mobile-overlay .mob-div{width:40px;height:1px;background:var(--gold);opacity:.2;margin:6px 0}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  nav{padding:22px 30px}nav.s{padding:14px 30px}
  .hamburger{display:flex}
  .nlinks{display:none}
  #hero{padding-top:40px}
  .ring{opacity:.4}
}

@media(max-width:768px){
  html{font-size:15px}
  nav{padding:16px 20px}nav.s{padding:12px 20px}
  .nlogo{font-size:10px;letter-spacing:3px}
  #hero{min-height:100vh;height:auto;padding:120px 20px 60px}
  .hbadge{font-size:8px;letter-spacing:4px;flex-wrap:wrap}
  .hbadge::before,.hbadge::after{width:28px}
  .htitle{font-size:clamp(2.5rem,10vw,4rem);letter-spacing:0}
  .hsub{font-size:clamp(.85rem,3vw,1.1rem);letter-spacing:2px}
  .htag{font-size:clamp(.9rem,2.5vw,1rem);max-width:90%}
  .hdiv{height:40px;margin:20px auto}
  .hcta{gap:14px;flex-direction:column;align-items:center;width:100%;max-width:300px;margin:30px auto 0}
  .hcta .btn-mag{width:100%;max-width:280px}
  .btn-p,.btn-s{width:100%;text-align:center;padding:16px 30px;font-size:10px;letter-spacing:2px}
  .scroll-ind{bottom:20px}
  .scroll-ind span{font-size:8px}
  .mouse-glow{display:none}
  .timeline-bar{width:120px;bottom:16px}
  .ambient-glow .orb{opacity:.06;filter:blur(100px)}
}

@media(max-width:480px){
  html{font-size:14px}
  nav{padding:12px 16px}nav.s{padding:10px 16px}
  .nlogo{font-size:9px;letter-spacing:2px}
  #hero{padding:100px 16px 50px}
  .hbadge{font-size:7px;letter-spacing:3px;gap:10px}
  .hbadge::before,.hbadge::after{width:18px}
  .htitle{font-size:clamp(2rem,12vw,2.8rem)}
  .hsub{font-size:clamp(.75rem,3.5vw,.95rem)}
  .htag{font-size:clamp(.8rem,3vw,.9rem)}
  .hdiv{height:30px;margin:16px auto}
  .hcta{max-width:240px}
  .btn-p,.btn-s{padding:14px 24px;font-size:9px;letter-spacing:1.5px}
  #gl-canvas{display:none}
  .ambient-glow{display:none}
  .ring{display:none}
  #cur{display:none}
  body{cursor:auto}
  .sparkle{display:none}
  .ripple-el{display:none}
  .prog-line{height:1px}
  .timeline-bar{display:none}
}

/* ── KEYFRAMES ── */
@keyframes aup{from{opacity:0;transform:translateY(35px)}to{opacity:1;transform:translateY(0)}}
@keyframes afadein{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:300% center}}
@keyframes glitch1{0%{clip-path:inset(0 0 95% 0);transform:translate(-3px,0)}50%{clip-path:inset(40% 0 50% 0);transform:translate(3px,0)}100%{clip-path:inset(0 0 0 0);transform:translate(0,0)}}
@keyframes glitch2{0%{clip-path:inset(60% 0 20% 0);transform:translate(3px,0)}50%{clip-path:inset(10% 0 80% 0);transform:translate(-3px,0)}100%{clip-path:inset(0 0 0 0);transform:translate(0,0)}}
@keyframes scrollw{0%,100%{transform:translateY(0);opacity:1}50%{transform:translateY(10px);opacity:0}}
@keyframes popIn{from{opacity:0;transform:scale(.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes rippleFX{0%{transform:translate(-50%,-50%) scale(0);opacity:.6}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
@keyframes spin1{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes spin2{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(-360deg)}}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* ── SPLIT TEXT ── */
.split-char{display:inline-block;opacity:0;transform:translateY(40px) rotateX(-30deg);animation:charIn .6s forwards;transform-origin:50% 100%}
@keyframes charIn{to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- PROGRESS BAR -->
<div class="prog-line" id="prog"></div>

<!-- TIMELINE BAR -->
<div class="timeline-bar" id="timelineBar"><div class="timeline-fill" id="timelineFill"></div></div>

<!-- MOUSE GLOW -->
<div class="mouse-glow" id="mouseGlow"></div>

<!-- CURSOR -->
<div id="cur"><div id="cur-dot"></div><div id="cur-ring"></div></div>

<!-- AMBIENT GLOW ORBS -->
<div class="ambient-glow">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<!-- WEBGL CANVAS -->
<canvas id="gl-canvas"></canvas>

<!-- NAV -->
<nav id="nav">
  <div class="nav-line"></div>
  <a href="#hero" class="nlogo"><span class="logo-gold">M<sup style="font-size:.6em">e</sup> K. Chafai</span></a>
  <div class="nlinks">
    <a href="about.html" data-text="Cabinet"><span>Cabinet</span><div class="nlink-line"></div></a>
    <a href="domaines.html" data-text="Domaines"><span>Domaines</span><div class="nlink-line"></div></a>
    <a href="temoignages.html" data-text="Avis"><span>Avis</span><div class="nlink-line"></div></a>
    <a href="contact.html" data-text="Contact"><span>Contact</span><div class="nlink-line"></div></a>
  </div>
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<!-- MOBILE OVERLAY -->
<div class="mobile-overlay" id="mobileOverlay">
  <a href="about.html">Cabinet</a>
  <div class="mob-div"></div>
  <a href="domaines.html">Domaines</a>
  <div class="mob-div"></div>
  <a href="temoignages.html">Avis</a>
  <div class="mob-div"></div>
  <a href="contact.html">Contact</a>
  <div class="mob-div"></div>
</div>

<section id="hero" data-tilt>
  <div class="ring" style="width:500px;height:500px;animation:spin1 50s linear infinite" id="r1"></div>
  <div class="ring" style="width:740px;height:740px;animation:spin2 70s linear infinite" id="r2"></div>
  <div class="ring" style="width:980px;height:980px;animation:spin1 90s linear infinite" id="r3"></div>
  <div class="ring" style="width:1220px;height:1220px;animation:spin2 110s linear infinite;opacity:.4" id="r4"></div>

  <div class="hero-inner">
    <p class="hbadge">Avocat au Barreau de Tanger</p>
    <h1 class="htitle">
      <span class="glitch" data-text="Maître">Maître</span><br>
      <span class="gold-line" data-text="Khalid Chafai">Khalid Chafai</span>
    </h1>
    <p class="hsub">
      <span class="hsub-word" style="animation-delay:1s">Avocat</span>
      <span style="opacity:0;animation:hsubIn .3s 1.15s forwards"> &nbsp;·&nbsp;</span>
      <span class="hsub-word" style="animation-delay:1.1s">محامي</span>
      <span style="opacity:0;animation:hsubIn .3s 1.25s forwards"> &nbsp;·&nbsp;</span>
      <span class="hsub-word" style="animation-delay:1.2s">Lawyer</span>

<script>
// ── CUSTOM CURSOR with enhanced trail ──
const cur=document.getElementById('cur'),dot=document.getElementById('cur-dot'),ring=document.getElementById('cur-ring');
let mx=window.innerWidth/2,my=window.innerHeight/2,rx=mx,ry=my;
const trail=[];const TRAIL_LEN=16;
for(let i=0;i<TRAIL_LEN;i++){
  const d=document.createElement('div');d.className='trail-dot';
  d.style.opacity=(1-(i/TRAIL_LEN))*.3;
  d.style.width=d.style.height=(5-(i*.25))+'px';
  d.style.background=i<3?'var(--gold)':'rgba(201,168,76,'+(.5-(i*.03))+')';
  document.body.appendChild(d);
  trail.push({el:d,x:mx,y:my})
}
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
let lx=[],ly=[];for(let i=0;i<TRAIL_LEN;i++){lx.push(mx);ly.push(my)}
function animCur(){
  dot.style.left=mx+'px';dot.style.top=my+'px';
  rx+=(mx-rx)*.12;ry+=(my-ry)*.12;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  lx.unshift(mx);lx.pop();ly.unshift(my);ly.pop();
  trail.forEach((t,i)=>{t.x+=(lx[i]-t.x)*.3;t.y+=(ly[i]-t.y)*.3;t.el.style.left=t.x+'px';t.el.style.top=t.y+'px'});
  requestAnimationFrame(animCur)
}animCur();

document.querySelectorAll('a,button,.btn-p,.btn-s,.btn-mag,.tcard,.ditem,.fcard,.soc,.cdetail').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ring.classList.add('hover')});
  el.addEventListener('mouseleave',()=>{ring.classList.remove('hover')});
});

// ── MOUSE GLOW ──
const mg=document.getElementById('mouseGlow');
document.addEventListener('mousemove',e=>{
  mg.style.left=e.clientX+'px';mg.style.top=e.clientY+'px';
});

// ── WEBGL PARTICLE FIELD ──
(function(){
  const cv=document.getElementById('gl-canvas');
  const gl=cv.getContext('webgl',{alpha:true,antialias:true});
  if(!gl)return;
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;gl.viewport(0,0,cv.width,cv.height)}
  resize();window.addEventListener('resize',resize);
  const vs=`attribute vec2 a_pos;attribute float a_sz;attribute float a_alpha;uniform vec2 u_res;void main(){vec2 clip=(a_pos/u_res)*2.0-1.0;clip.y*=-1.0;gl_Position=vec4(clip,0,1);gl_PointSize=a_sz;}`;
  const fs=`precision mediump float;void main(){vec2 c=gl_PointCoord*2.0-1.0;float d=dot(c,c);if(d>1.0)discard;float a=0.4*(1.0-d);gl_FragColor=vec4(0.784,0.659,0.298,a*0.7);}`;
  function mk(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s}
  const prog=gl.createProgram();
  gl.attachShader(prog,mk(gl.VERTEX_SHADER,vs));
  gl.attachShader(prog,mk(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(prog);gl.useProgram(prog);
  const N=400;
  const pos=new Float32Array(N*2),sz=new Float32Array(N),al=new Float32Array(N);
  const vx=new Float32Array(N),vy=new Float32Array(N),life=new Float32Array(N),maxL=new Float32Array(N);
  for(let i=0;i<N;i++){pos[i*2]=Math.random()*cv.width;pos[i*2+1]=Math.random()*cv.height;sz[i]=Math.random()*2.5+.5;al[i]=Math.random()*.5+.1;vx[i]=(Math.random()-.5)*.5;vy[i]=(Math.random()-.5)*.5-.2;life[i]=Math.random()*400;maxL[i]=Math.random()*300+200}
  const posBuf=gl.createBuffer(),szBuf=gl.createBuffer();
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
  const aPos=gl.getAttribLocation(prog,'a_pos'),aSz=gl.getAttribLocation(prog,'a_sz');
  const uRes=gl.getUniformLocation(prog,'u_res');
  function draw(){
    for(let i=0;i<N;i++){
      pos[i*2]+=vx[i];pos[i*2+1]+=vy[i];life[i]++;
      if(life[i]>maxL[i]||pos[i*2+1]<-10||pos[i*2]<-10||pos[i*2]>cv.width+10){pos[i*2]=Math.random()*cv.width;pos[i*2+1]=cv.height+10;life[i]=0}
    }
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform2f(uRes,cv.width,cv.height);
    gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);gl.bufferData(gl.ARRAY_BUFFER,pos,gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(aPos);gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,szBuf);gl.bufferData(gl.ARRAY_BUFFER,sz,gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(aSz);gl.vertexAttribPointer(aSz,1,gl.FLOAT,false,0,0);
    gl.drawArrays(gl.POINTS,0,N);
    requestAnimationFrame(draw)
  }draw();
})();

// ── PROGRESS BAR & NAV SCROLL ──
const prog=document.getElementById('prog');
const timelineBar=document.getElementById('timelineBar');
const timelineFill=document.getElementById('timelineFill');
window.addEventListener('scroll',()=>{
  const st=window.scrollY,dh=document.documentElement.scrollHeight-window.innerHeight;
  const pct=st/dh;
  prog.style.transform=`scaleX(${pct})`;
  timelineFill.style.width=(pct*100)+'%';
  document.getElementById('nav').classList.toggle('s',st>60);
  timelineBar.classList.toggle('active',st>100);
  ['r1','r2','r3','r4'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.style.marginTop=(st*(.04*(i+1)))+'px'});
});

// ── MOUSE PARALLAX on rings ──
document.addEventListener('mousemove',e=>{
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  const dx=(e.clientX-cx)/cx,dy=(e.clientY-cy)/cy;
  ['r1','r2','r3','r4'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el){const s=(i+1)*12;el.style.transform=`translate(calc(-50% + ${dx*s}px), calc(-50% + ${dy*s}px))`}
  });
});

// ── 3D TILT ON HERO ──
const hero=document.getElementById('hero');
const heroInner=hero.querySelector('.hero-inner');
hero.addEventListener('mousemove',e=>{
  const r=hero.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
  heroInner.style.transform=`perspective(1200px) rotateY(${x*8}deg) rotateX(${-y*8}deg) translateZ(20px)`;
});
hero.addEventListener('mouseleave',()=>{
  heroInner.style.transform='perspective(1200px) rotateY(0deg) rotateX(0deg) translateZ(0)';
});

// ── GLITCH EFFECT ──
setInterval(()=>{
  const g=document.querySelector('.htitle .glitch');
  if(g){g.classList.add('active');setTimeout(()=>g.classList.remove('active'),500)}
},3500);

// ── MAGNETIC BUTTONS ──
document.querySelectorAll('.btn-mag').forEach(wrap=>{
  const btn=wrap.querySelector('.btn-p,.btn-s');
  if(!btn)return;
  wrap.addEventListener('mousemove',e=>{
    const r=wrap.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    const dx=e.clientX-cx,dy=e.clientY-cy;
    btn.style.transform=`translate(${dx*.25}px, ${dy*.25}px)`;
  });
  wrap.addEventListener('mouseleave',()=>{btn.style.transform='translate(0,0)'});
});

// ── RIPPLE ON CLICK ──
document.addEventListener('click',e=>{
  if(e.target.closest('a,button,.btn-p,.btn-s,.ditem,.fcard,.tcard,.soc')){
    const rip=document.createElement('div');
    rip.className='ripple-el';
    rip.style.left=e.clientX+'px';rip.style.top=e.clientY+'px';
    document.body.appendChild(rip);
    setTimeout(()=>rip.remove(),900);
    createSparkles(e.clientX,e.clientY);
  }
});

// ── SPARKLE BURST ──
function createSparkles(x,y,count=8){
  const container=document.createElement('div');
  container.className='sparkle';
  container.style.left=x+'px';container.style.top=y+'px';
  for(let i=0;i<count;i++){
    const s=document.createElement('div');
    s.className='sparkle-inner';
    const angle=(Math.PI*2/count)*i+Math.random()*.5;
    const dist=30+Math.random()*40;
    s.style.setProperty('--tx',Math.cos(angle)*dist+'px');
    s.style.setProperty('--ty',Math.sin(angle)*dist+'px');
    s.style.animationDelay=Math.random()*.1+'s';
    container.appendChild(s);
  }
  document.body.appendChild(container);
  setTimeout(()=>container.remove(),1200);
}

// ── TEXT SPLIT ON HERO ──
function splitAndAnimate(el,delay=0){
  const text=el.textContent;el.innerHTML='';
  [...text].forEach((ch,i)=>{
    const s=document.createElement('span');s.className='split-char';
    s.style.animationDelay=`${delay+i*.04}s`;
    s.textContent=ch==' '?'\u00A0':ch;el.appendChild(s);
  });
}
window.addEventListener('load',()=>{
  document.querySelectorAll('.hbadge').forEach(el=>splitAndAnimate(el,.6));
});

// ── SCROLL-DRIVEN COLOR SHIFT ──
window.addEventListener('scroll',()=>{
  const pct=window.scrollY/(document.documentElement.scrollHeight-window.innerHeight);
  const logo=document.querySelector('.nlogo .logo-gold');
  if(logo)logo.style.filter=`hue-rotate(${pct*10}deg)`;
});

// ── RANDOM FLOATING SPARKLES (ambient) ──
(function ambientSparkles(){
  let lastT=0;
  function spawn(){
    const now=Date.now();
    if(now-lastT>800+Math.random()*1200){
      lastT=now;
      const x=Math.random()*window.innerWidth,y=Math.random()*window.innerHeight;
      createSparkles(x,y,2+Math.floor(Math.random()*3));
    }
    requestAnimationFrame(spawn);
  }
  setTimeout(spawn,2000);
})();

// ── HAMBURGER MENU TOGGLE ──
const hamburger=document.getElementById('hamburger');
const mobileOverlay=document.getElementById('mobileOverlay');
if(hamburger&&mobileOverlay){
  hamburger.addEventListener('click',()=>{
    hamburger.classList.toggle('active');
    mobileOverlay.classList.toggle('active');
    document.body.style.overflow=mobileOverlay.classList.contains('active')?'hidden':'';
  });
  mobileOverlay.querySelectorAll('a').forEach(a=>{
    a.addEventListener('click',()=>{
      hamburger.classList.remove('active');
      mobileOverlay.classList.remove('active');
      document.body.style.overflow='';
    });
  });
}
